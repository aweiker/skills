name: Tag Release

on:
  pull_request:
    types:
      - closed
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  tag:
    name: Tag merged release PR
    permissions:
      contents: write # push the annotated release tag
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'chore: release v')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install test dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq shellcheck

      - name: Verify release metadata
        id: release
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          bash tests/run-all.sh
          version="$(node -p "require('./package.json').version")"
          expected_title="chore: release v${version}"
          if [ "$PR_TITLE" != "$expected_title" ]; then
            echo "Release PR title must be '$expected_title'" >&2
            exit 1
          fi
          if git rev-parse "v${version}" >/dev/null 2>&1; then
            echo "Tag v${version} already exists" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || github.token }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/v${VERSION}"
